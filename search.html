<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results — ToFo Market</title>

    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<header class="tf-header">
    <div class="tf-header__top">
        <a href="index.html" class="tf-back-btn" aria-label="Back to home">←</a>
        <a href="index.html" class="tf-logo">
            <img src="assets/images/logo.svg" alt="ToFo Market Logo">
        </a>
        <div class="tf-header__top-actions">
            <a href="cart.html" class="tf-cart-icon" aria-label="Cart">
                🛒<span class="tf-cart-count">0</span>
            </a>
        </div>
    </div>

    <div class="tf-container">
        <form class="tf-search" id="searchForm">
            <input type="text" placeholder="Search ToFo Market" id="searchInput" required>
            <button type="submit" aria-label="Search">🔍</button>
        </form>
    </div>
</header>

<main class="tf-container tf-section">
    <div class="tf-section__head">
        <h2 id="searchTitle">Search Results</h2>
        <span id="product-count">Loading...</span>
    </div>
    <div id="product-grid" class="tf-grid">
        <!-- JS yahan results inject karega -->
    </div>
</main>

<footer class="tf-footer">
    <div class="tf-container tf-footer__row">
        <div><strong>ToFo Market</strong> — Your trusted marketplace</div>
        <div>© 2026 ToFo Market. All Rights Reserved.</div>
    </div>
</footer>

<script src="js/components/loading.js"></script>
<script src="js/components/error.js"></script>
<script src="js/data/products.js"></script>
<script src="js/components/cart.js"></script>
<script src="js/pages/search.js"></script>

</body>
</html>
